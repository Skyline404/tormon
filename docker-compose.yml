version: '3.8'

services:
  torrentmonitor:
    build:
      context: .
      args:
        # Передаем UID и GID текущего пользователя хоста
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: torrentmonitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
